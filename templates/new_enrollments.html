<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Enrollments — Mathnasium Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #f0f2f5; }
    header { background: #1e3a5f; color: white; padding: 16px 32px; display: flex; align-items: center; gap: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    header h1 { font-size: 1.4rem; font-weight: 700; margin: 0; }
    .nav-back { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.9rem; }
    .nav-back:hover { color: white; }
    #log-pre { background: #0f172a; color: #e2e8f0; font-family: "SF Mono", "Fira Code", monospace; font-size: 0.82rem; min-height: 200px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; padding: 16px; border-radius: 6px; }
  </style>
</head>
<body>
  <header>
    <span style="font-size:1.8rem;">📈</span>
    <h1>Mathnasium Automations</h1>
    <a href="/" class="nav-back ms-auto">← Back to Dashboard</a>
  </header>

  <div class="container mt-4" style="max-width: 760px;">
    <h2 class="mb-1">📈 New Enrollments</h2>
    <p class="text-muted mb-4">New student enrollments by month with program type and amount charged.</p>

    <!-- Form card -->
    <div class="card mb-4">
      <div class="card-body">
        <div class="row g-3 mb-3">
          <div class="col-sm-6">
            <label for="fromMonth" class="form-label fw-bold">From</label>
            <input type="month" id="fromMonth" class="form-control">
          </div>
          <div class="col-sm-6">
            <label for="toMonth" class="form-label fw-bold">To</label>
            <input type="month" id="toMonth" class="form-control">
          </div>
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="redownload" checked>
          <label class="form-check-label" for="redownload">
            Re-download data from Radius
          </label>
        </div>
        <button id="runBtn" class="btn btn-primary" disabled>
          <span id="runSpinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
          <span id="runBtnLabel">▶ Run Report</span>
        </button>
      </div>
    </div>

    <!-- Log card (hidden until run starts) -->
    <div id="logCard" class="card mb-4 d-none">
      <div class="card-header d-flex align-items-center justify-content-between">
        <span class="fw-bold">Output</span>
        <span id="statusBadge"></span>
      </div>
      <div class="card-body p-0">
        <pre id="log-pre"></pre>
      </div>
    </div>

    <!-- Download section (shown after successful run) -->
    <div id="downloadSection" class="d-none">
      <h5 class="mb-3">Download Reports</h5>
      <div class="d-flex gap-3">
        <a href="/new-enrollments/download/teaneck" class="btn btn-success">⬇ Download Teaneck</a>
        <a href="/new-enrollments/download/englewood" class="btn btn-success">⬇ Download Englewood</a>
      </div>
    </div>
  </div>

  <script>
    const fromInput = document.getElementById("fromMonth");
    const toInput   = document.getElementById("toMonth");
    const runBtn    = document.getElementById("runBtn");

    // Default: "From" = 12 months ago, "To" = current month
    (function() {
      const now = new Date();
      const toVal = now.toISOString().slice(0, 7);
      const fromDate = new Date(now.getFullYear(), now.getMonth() - 12, 1);
      const fromVal = fromDate.toISOString().slice(0, 7);
      fromInput.value = fromVal;
      toInput.value = toVal;
      checkReady();
    })();

    fromInput.addEventListener("input", checkReady);
    toInput.addEventListener("input", checkReady);

    function checkReady() {
      runBtn.disabled = !(fromInput.value && toInput.value);
    }

    runBtn.addEventListener("click", function() {
      const from      = fromInput.value;
      const to        = toInput.value;
      const redownload = document.getElementById("redownload").checked;

      const logCard   = document.getElementById("logCard");
      const logPre    = document.getElementById("log-pre");
      const badge     = document.getElementById("statusBadge");
      const spinner   = document.getElementById("runSpinner");
      const btnLabel  = document.getElementById("runBtnLabel");
      const dlSection = document.getElementById("downloadSection");

      // Reset UI
      logCard.classList.remove("d-none");
      dlSection.classList.add("d-none");
      logPre.textContent = "";
      badge.innerHTML = '<span class="badge bg-primary">Running…</span>';
      runBtn.disabled = true;
      spinner.classList.remove("d-none");
      btnLabel.textContent = "Running…";

      fetch("/api/new-enrollments/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ from, to, redownload }),
      }).then(function(response) {
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        function read() {
          reader.read().then(function({ done, value }) {
            if (done) {
              finish(false);
              return;
            }
            buffer += decoder.decode(value, { stream: true });
            const parts = buffer.split("\n\n");
            buffer = parts.pop(); // incomplete chunk
            parts.forEach(function(part) {
              const line = part.trim();
              if (!line.startsWith("data:")) return;
              const text = JSON.parse(line.slice(5).trim());
              if (text === "__DONE__") {
                badge.innerHTML = '<span class="badge bg-success">Done</span>';
                dlSection.classList.remove("d-none");
                finish(true);
                return;
              }
              if (text.startsWith("__ERROR__")) {
                badge.innerHTML = '<span class="badge bg-danger">Error</span>';
                appendLine("✗ " + text);
                finish(false);
                return;
              }
              appendLine(text);
            });
            read();
          });
        }
        read();
      }).catch(function(err) {
        badge.innerHTML = '<span class="badge bg-danger">Error</span>';
        appendLine("Error: " + err);
        finish(false);
      });

      function appendLine(text) {
        logPre.textContent += text + "\n";
        logPre.scrollTop = logPre.scrollHeight;
      }

      function finish(success) {
        spinner.classList.add("d-none");
        btnLabel.textContent = "▶ Run Report";
        runBtn.disabled = false;
        if (!success && !badge.innerHTML.includes("bg-danger")) {
          badge.innerHTML = '<span class="badge bg-danger">Error</span>';
        }
      }
    });
  </script>
</body>
</html>
